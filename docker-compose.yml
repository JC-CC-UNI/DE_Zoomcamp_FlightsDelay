version: "3.8"

volumes:
  kestra_postgres_data:
  kestra_data:
  kestra_tmp:

services:
  kestra_postgres:
    image: postgres:18
    container_name: kestra_postgres
    restart: always
    volumes:
      - kestra_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  kestra:
    image: kestra/kestra:v1.1
    container_name: kestra
    restart: always
    user: "root"
    command: server standalone

    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra_tmp:/tmp/kestra-wd
      - ./:/workspace
      - ./keys:/workspace/keys

    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /workspace/keys/gcp-key.json
      DBT_PROFILES_DIR: /workspace/models_dbt

      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
        kestra:
          server:
            basicAuth:
              username: "admin@kestra.io"
              password: Admin1234!
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/

    ports:
      - "8080:8080"

    depends_on:
      kestra_postgres:
        condition: service_started